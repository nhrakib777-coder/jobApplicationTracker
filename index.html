<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="./assest/css/main.css" />
    <!-- fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap"
      rel="stylesheet" />
    <!-- font awesome -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer" />
    <!-- css -->
    <style>
      * {
        font-family: 'Geist', sans-serif;
      }
    </style>

    <title>Job Application Tracker</title>
  </head>
  <body class="bg-base-200 p-4">
    <!-- dashboard header -->
    <header class="container mx-auto">
      <h1 class="text-3xl font-bold mb-4 text-[#002c5c]">
        Job Application Tracker
      </h1>
      <section class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-6">
        <div class="card bg-base-100 shadow p-4">
          <h2 class="font-semibold text-[#002c5c]">Total Jobs</h2>
          <p id="totalCount" class="text-2xl font-bold text-[#002c5c]">0</p>
        </div>
        <div class="card bg-base-100 shadow p-4">
          <h2 class="font-semibold text-[#002c5c]">Interview</h2>
          <p id="interviewCount" class="text-2xl font-bold text-green-400">0</p>
        </div>
        <div class="card bg-base-100 shadow p-4">
          <h2 class="font-semibold text-[#002c5c]">Rejected</h2>
          <p id="rejectedCount" class="text-2xl font-bold text-red-400">0</p>
        </div>
      </section>
    </header>
  </body>
</html>
